    <rect x="64" y="100" width="10" height="14" rx="2" fill="#1a6bff" fill-opacity="0.15"/>
    <rect x="64" y="122" width="10" height="14" rx="2" fill="#1a6bff" fill-opacity="0.15"/>
    <rect x="64" y="144" width="10" height="14" rx="2" fill="#1a6bff" fill-opacity="0.15"/>
    <rect x="64" y="166" width="10" height="14" rx="2" fill="#1a6bff" fill-opacity="0.15"/>
    <rect x="64" y="188" width="10" height="14" rx="2" fill="#1a6bff" fill-opacity="0.15"/>
