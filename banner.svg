<svg viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg" width="100%">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="50%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a6bff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#1a6bff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1a6bff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="filmFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a6bff" stop-opacity="0"/>
      <stop offset="30%" stop-color="#1a6bff" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#1a6bff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1a6bff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip"><rect width="900" height="220" rx="12"/></clipPath>
  </defs>

  <rect width="900" height="220" rx="12" fill="url(#bg)"/>

  <!-- grid lines -->
  <g stroke="#1a6bff" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="44" x2="900" y2="44"/>
    <line x1="0" y1="88" x2="900" y2="88"/>
    <line x1="0" y1="132" x2="900" y2="132"/>
