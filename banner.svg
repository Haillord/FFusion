    <rect x="33" y="142" width="30" height="18" rx="1" fill="#1a6bff" fill-opacity="0.11"/>
    <rect x="33" y="164" width="30" height="18" rx="1" fill="#1a6bff" fill-opacity="0.09"/>
    <rect x="33" y="186" width="30" height="18" rx="1" fill="#1a6bff" fill-opacity="0.13"/>
