    <line x1="540" y1="0" x2="540" y2="220"/>
    <line x1="720" y1="0" x2="720" y2="220"/>
  </g>

  <!-- accent glow strip -->
  <rect x="0" y="90" width="900" height="40" fill="url(#accentGrad)"/>

